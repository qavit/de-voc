<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Vocabulary Master</title>
    <meta name="description" content="A premium application to master your German vocabulary efficiently.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="app-container">
        <header class="app-header">
            <h1>Deutsch Lernen 🇩🇪</h1>
            <div class="stats">
                <span class="stat-badge"><span id="learned-count">0</span> Learned</span>
                <span class="stat-badge"><span id="total-count">0</span> Total</span>
            </div>
        </header>

        <section class="flashcard-container" id="flashcard">
            <div class="flashcard-inner">
                <!-- Front Side -->
                <div class="flashcard-front">
                    <span class="word-category" id="front-category"></span>
                    <h2 class="german-word" id="german-word">Laden...</h2>
                    <p class="word-variation" id="word-variation"></p>
                    <div class="hint-text">Click to flip</div>
                </div>

                <!-- Back Side -->
                <div class="flashcard-back">
                    <div class="meaning-group">
                        <span class="meaning-label">中文 (Chinese)</span>
                        <h3 class="chinese-meaning" id="chinese-meaning"></h3>
                    </div>
                    <div class="meaning-group">
                        <span class="meaning-label">English</span>
                        <h3 class="english-meaning" id="english-meaning"></h3>
                    </div>
                    <div class="meaning-group" id="taiwanese-group">
                        <span class="meaning-label">台文 (Taiwanese)</span>
                        <p class="taiwanese-meaning" id="taiwanese-meaning"></p>
                    </div>
                </div>
            </div>
        </section>

        <nav class="controls">
            <button class="btn btn-secondary" id="btn-prev">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <button class="btn btn-primary" id="btn-random">Random</button>
            <button class="btn btn-secondary" id="btn-next">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
        </nav>

        <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
